services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_workflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:0.5.5
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.deploy
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.weave.example}
    depends_on:
      - db
      - redis
      - chroma
    ports:
      - "127.0.0.1:${WEAVE_API_BIND_PORT:-8001}:8000"
    volumes:
      - server_uploads:/app/storage/uploads

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile.deploy
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.weave.example}
    command: ["python", "-m", "arq", "app.workers.task_worker.WorkerSettings"]
    depends_on:
      - db
      - redis
      - chroma
    volumes:
      - server_uploads:/app/storage/uploads

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.deploy
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.lmpai.online/api/v1}
        NEXT_PUBLIC_MARKETING_SITE_URL: ${NEXT_PUBLIC_MARKETING_SITE_URL:-https://lmpai.online}
        NEXT_PUBLIC_AUTH_DISABLED: ${NEXT_PUBLIC_AUTH_DISABLED:-false}
        NEXT_PUBLIC_GUEST_ACCESS_ENABLED: ${NEXT_PUBLIC_GUEST_ACCESS_ENABLED:-false}
        NEXT_PUBLIC_PASSWORD_AUTH_DISABLED: ${NEXT_PUBLIC_PASSWORD_AUTH_DISABLED:-false}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.weave.example}
    environment:
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://server:8000/api/v1}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.lmpai.online/api/v1}
      NEXT_PUBLIC_MARKETING_SITE_URL: ${NEXT_PUBLIC_MARKETING_SITE_URL:-https://lmpai.online}
      NEXT_PUBLIC_AUTH_DISABLED: ${NEXT_PUBLIC_AUTH_DISABLED:-false}
      NEXT_PUBLIC_GUEST_ACCESS_ENABLED: ${NEXT_PUBLIC_GUEST_ACCESS_ENABLED:-false}
      NEXT_PUBLIC_PASSWORD_AUTH_DISABLED: ${NEXT_PUBLIC_PASSWORD_AUTH_DISABLED:-false}
    depends_on:
      - server
    ports:
      - "127.0.0.1:${WEAVE_WEB_BIND_PORT:-3001}:3000"

volumes:
  postgres_data:
  chroma_data:
  server_uploads:
