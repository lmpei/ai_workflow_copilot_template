services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_workflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:0.5.5
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  server:
    build: ./server
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - chroma
    volumes:
      - ./server:/app

  worker:
    build: ./server
    env_file: .env
    command: ["python", "-m", "arq", "app.workers.task_worker.WorkerSettings"]
    depends_on:
      - db
      - redis
    volumes:
      - ./server:/app

  web:
    build: ./web
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./web:/app

volumes:
  postgres_data:
  chroma_data:
