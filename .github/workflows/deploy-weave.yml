name: Deploy Weave

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-weave-production
  cancel-in-progress: false

jobs:
  explain-upstream-failure:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Explain why deploy was skipped
        run: |
          echo "::error title=Deploy Weave skipped::CI concluded with '${{ github.event.workflow_run.conclusion }}', so production deploy was not started."
          {
            echo "## Weave deploy skipped"
            echo
            echo "Deploy did not start because the upstream \`CI\` workflow did not succeed."
            echo
            echo "- branch: \`${{ github.event.workflow_run.head_branch }}\`"
            echo "- conclusion: \`${{ github.event.workflow_run.conclusion }}\`"
            echo "- upstream run: ${{ github.event.workflow_run.html_url }}"
            echo
            echo "### Next step"
            echo "Open the failed \`CI\` run, fix the blocking job, and push again. Deploy will resume automatically after \`CI\` succeeds on \`main\`."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy weave to production host
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 101.32.216.83
          username: ubuntu
          key: ${{ secrets.WEAVE_DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            /home/ubuntu/deploy-weave.sh

      - name: Summarize successful deploy
        if: success()
        run: |
          {
            echo "## Weave deploy succeeded"
            echo
            echo "- host: \`101.32.216.83\`"
            echo "- repo: \`/home/ubuntu/ai_workflow_copilot_template\`"
            echo "- entrypoint: \`/home/ubuntu/deploy-weave.sh\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Explain retry and rollback
        if: failure()
        run: |
          echo "::error title=Deploy Weave failed::Automatic deploy failed. Retry on the server with /home/ubuntu/deploy-weave.sh or roll back with bash /home/ubuntu/ai_workflow_copilot_template/scripts/rollback-weave.sh <known-good-ref>."
          {
            echo "## Weave deploy failed"
            echo
            echo "### Retry"
            echo '```bash'
            echo 'ssh ubuntu@101.32.216.83'
            echo '/home/ubuntu/deploy-weave.sh'
            echo '```'
            echo
            echo "### Roll back to a known-good ref"
            echo '```bash'
            echo 'ssh ubuntu@101.32.216.83'
            echo 'cd /home/ubuntu/ai_workflow_copilot_template'
            echo 'bash scripts/rollback-weave.sh <known-good-ref>'
            echo '```'
            echo
            echo "### Verify"
            echo '```bash'
            echo 'curl -I https://weave.lmpai.online'
            echo 'curl https://api.lmpai.online/api/v1/health'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
