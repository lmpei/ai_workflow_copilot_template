name: Deploy Weave

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-weave-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy weave to production host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 101.32.216.83
          username: ubuntu
          key: ${{ secrets.WEAVE_DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            /home/ubuntu/deploy-weave.sh
